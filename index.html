const loadStorage = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
};

const saveStorageCache = {};
const saveStorage = (key, data) => {
  try {
    const s = JSON.stringify(data);
    if (saveStorageCache[key] === s) return true;
    saveStorageCache[key] = s;
    localStorage.setItem(key, s);
    return true;
  } catch { return false; }
};

const inferFromProductName = (name) => {
  if (!name) return null;
  const n = name.toLowerCase();
  let volume = null, unit = null, baseScale = null;
  const match = n.match(/(\d+\.?\d*)\s*(ml|l|g|kg|枚|個|本|箱|m|cm|組|台)/i);
  if (match) {
    volume = match[1];
    const foundUnit = match[2].toLowerCase();
    const option = UNIT_OPTIONS.find(o => o.value.toLowerCase() === foundUnit || (foundUnit === 'l' && o.value === 'L'));
    if (option) { unit = option.value; baseScale = option.defaultBase; }
  }
  if (!unit) {
    if (n.includes('トイレット') || n.includes('ロール')) unit = '個';
    else if (n.includes('アルコール') || n.includes('石鹸') || n.includes('液') || n.includes('洗剤')) unit = 'ml';
    else if (n.includes('袋') || n.includes('グローブ') || n.includes('マスク')) unit = '枚';
    else if (n.includes('ラップ')) unit = 'm';
    else if (n.includes('車椅子') || n.includes('車いす') || n.includes('ベッド')) unit = '台';
    if (unit) { const option = UNIT_OPTIONS.find(o => o.value === unit); baseScale = option?.defaultBase || 1; }
  }
  return { volume, unit, baseScale };
};

const parseNumberInput = (raw) => {
  if (raw === null || raw === undefined) return '';
  return String(raw).replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0)).replace(/[,，\s]/g, '');
};

    try {
      const existing = document.getElementById('print-content-holder'); if (existing) existing.remove();
      const existingStyle = document.getElementById('print-injected-style'); if (existingStyle) existingStyle.remove();
      const holder = document.createElement('div'); holder.id = 'print-content-holder'; holder.innerHTML = html;
      const styleEl = document.createElement('style'); styleEl.id = 'print-injected-style';
      styleEl.textContent = `
        #print-content-holder { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f1f5f9; z-index: 99999; overflow: auto; padding: 0; }
        #print-content-holder::before { content: ''; display: block; height: 60px; }
        #print-content-holder .page { background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.15); margin: 0 auto 40px !important; max-width: 210mm !important; }
        #print-toolbar { position: fixed; top: 0; left: 0; right: 0; background: #1e293b; color: #fff; padding: 10px 20px; z-index: 100000; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        #print-toolbar button.primary { background: #ef4444; color: #fff; } #print-toolbar button.primary:hover { background: #dc2626; }
        #print-toolbar button.secondary { background: #475569; color: #fff; } #print-toolbar button.secondary:hover { background: #334155; }
        @media print {
          #print-toolbar { display: none !important; }
          #print-content-holder { position: static !important; background: #fff !important; overflow: visible !important; padding: 0 !important; }
          #print-content-holder::before { display: none !important; }
          #print-content-holder .page { box-shadow: none !important; margin: 0 !important; max-width: 100% !important; }
          body > *:not(#print-content-holder) { display: none !important; }
          @page { size: A4; margin: 12mm 10mm; }
          html, body { background: #fff !important; margin: 0 !important; padding: 0 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
      `;
      const toolbar = document.createElement('div'); toolbar.id = 'print-toolbar';
      toolbar.innerHTML = `<div class="info">📄 印刷プレビュー　<strong>「印刷する」</strong>を押すか、<strong>Ctrl+P</strong>で印刷できます</div><div class="actions"><button class="primary" id="print-toolbar-print">🖨 印刷する</button><button class="secondary" id="print-toolbar-close">✕ 閉じる</button></div>`;
      document.head.appendChild(styleEl); document.body.appendChild(holder); document.body.appendChild(toolbar);
      const cleanup = () => { holder.remove(); styleEl.remove(); toolbar.remove(); document.removeEventListener('keydown', escH); };
      const escH = (e) => { if (e.key === 'Escape') cleanup(); };
      document.addEventListener('keydown', escH);
      document.getElementById('print-toolbar-print').onclick = () => { try { window.print(); } catch { alert('Ctrl+Pで印刷してください'); } };
      document.getElementById('print-toolbar-close').onclick = cleanup;

                </div>
                <div className="bg-indigo-50 border border-indigo-200 rounded p-3">
                  <div className="font-bold text-indigo-800 mb-1">📁 「フォルダ管理」タブ：施設フォルダと過去の見積を管理</div>
                  <ul className="list-disc pl-5 space-y-0.5 text-[13px]">
                    <li><strong>左サイドバー：</strong>施設フォルダの一覧。「すべての見積」「フォルダなし」「各施設フォルダ」を切り替え</li>
                    <li><strong>右ペイン：</strong>選択中フォルダ内の見積一覧。「開く」ボタンで<strong>過去の見積を呼び戻せます</strong>（編集中の内容は上書きされるので保存してから）</li>
                    <li><strong>名前の編集：</strong>フォルダ名・見積名はいずれも<strong>ダブルクリック</strong>でその場編集できます（Enterで確定、Escで取消）。⚙ボタンでも編集できます</li>
                    <li><strong>新規施設フォルダ追加：</strong>左サイドバー下部の入力欄から、見積を保存せずにフォルダだけ作成可能</li>
                    <li><strong>見積のリネーム：</strong>各見積の⚙ボタンでインライン編集</li>
                    <li><strong>見積のフォルダ移動：</strong>各見積の📁プルダウンで別フォルダへ移動</li>
                  </ul>
                </div>
                <div className="text-[11px] text-slate-500 mt-2">💾 データは各ブラウザのlocalStorageに保存されます。営業所間・PC間では共有されません。</div>
              </section>

              <section className="bg-white p-4 rounded border border-slate-200">
                <h4 className="font-bold text-base mb-2 flex items-center gap-2 text-slate-800"><Coins className="w-5 h-5 text-orange-500" /> 2. 原価入力と利益率の自動計算</h4>
                <p className="mb-2">画面上部の<strong>「原価ON」</strong>ボタンを押すと、商品行に原価列（仕入額）と利益率列が追加されます。<span className="text-[11px] text-slate-500">（原価ON時の列は印刷時には非表示になります）</span></p>
                <div className="bg-orange-50 border border-orange-200 rounded p-3 mb-2">
                  <div className="font-bold text-orange-800 mb-1">💡 計算ロジック（自動連動）</div>
                  <table className="w-full text-[12px] border-collapse">
                    <thead className="bg-orange-100">
                      <tr><th className="border border-orange-300 px-2 py-1 text-left">入力した項目</th><th className="border border-orange-300 px-2 py-1 text-left">自動で計算される項目</th></tr>
                    </thead>
                    <tbody>
                      <tr><td className="border border-orange-200 px-2 py-1"><strong>原価</strong>のみ入力</td><td className="border border-orange-200 px-2 py-1">利益率欄が空欄なら影響なし／販売価格も入っていれば <strong>利益率 = (販売価格 - 原価) ÷ 販売価格 × 100</strong> を自動表示</td></tr>
                      <tr className="bg-white"><td className="border border-orange-200 px-2 py-1"><strong>原価＋利益率</strong>を入力</td><td className="border border-orange-200 px-2 py-1"><strong>販売価格 = 原価 ÷ (1 − 利益率÷100)</strong> を自動算出して単価欄にセット</td></tr>
                      <tr><td className="border border-orange-200 px-2 py-1"><strong>販売価格＋原価</strong>を入力</td><td className="border border-orange-200 px-2 py-1">利益率を自動逆算して表示（小数1桁）</td></tr>
                    </tbody>
                  </table>
                </div>
                <div className="bg-slate-50 border border-slate-200 rounded p-3 text-[12px]">
                  <div className="font-bold text-slate-700 mb-1">📘 入力例：除菌液 500ml</div>
                  <ul className="list-disc pl-5 space-y-0.5">
                    <li>原価に <code className="bg-white px-1 rounded">280</code> と入力</li>
                    <li>目標利益率に <code className="bg-white px-1 rounded">30</code> と入力</li>
                    <li>→ 単価欄に自動で <strong>¥400</strong> がセットされます（280 ÷ 0.7 = 400）</li>
                    <li>逆に、原価<code className="bg-white px-1 rounded">280</code>＋単価<code className="bg-white px-1 rounded">400</code>を入力すれば利益率<strong>30.0%</strong>が表示されます</li>
                  </ul>
                </div>
                <div className="text-[11px] text-slate-500 mt-2">⚠️ 利益率は0〜100の範囲で入力してください（100以上は無効）</div>
              </section>

              <section className="bg-white p-4 rounded border border-slate-200">
                <h4 className="font-bold text-base mb-2 flex items-center gap-2 text-slate-800"><FileText className="w-5 h-5 text-blue-600" /> 3. 見積書の入力例（実際の流れ）</h4>
                <div className="bg-slate-50 border border-slate-200 rounded p-3 text-[12px] space-y-2">
                  <div><strong className="text-slate-700">① 宛先の入力</strong><br/>「施設名（1段目）」に <code className="bg-white px-1 rounded">○○病院</code>、「敬称」で <code className="bg-white px-1 rounded">御中</code> を選択<br/>2段目（任意）に「介護事業部 御担当者様」など</div>
                  <div><strong className="text-slate-700">② 発行日</strong><br/>カレンダーから選ぶと右側に「2026年5月16日」のように自動表示</div>
                  <div><strong className="text-slate-700">③ モード選択</strong><br/>・<strong>見積作成モード</strong>：数量×単価で金額計算<br/>・<strong>提案書作成モード</strong>：ケース入数×単価で計算＋容量・単位表示</div>
                  <div><strong className="text-slate-700">④ 商品カテゴリの追加</strong><br/>「新しい商品カテゴリを追加」ボタンでカテゴリ枠を作成<br/>カテゴリ名例：<code className="bg-white px-1 rounded">ビニール手袋</code> <code className="bg-white px-1 rounded">トイレットペーパー</code> <code className="bg-white px-1 rounded">アルコール除菌液</code></div>
                  <div><strong className="text-slate-700">⑤ 商品の入力</strong>（1行目は自動的に「現状品」、2行目以降が提案品）<br/>例：<br/>・1行目（現状品）：プラスチック手袋 100枚入　数量100　単価¥350<br/>・2行目（提案品）：ニトリル手袋 100枚入　数量100　単価¥280　原価¥210（利益率25%自動表示）</div>
                  <div><strong className="text-slate-700">⑥ 並び替え・マーカー</strong><br/>各行の⬆⬇で並び替え、🖍ボタンで黄色マーカー強調</div>
                  <div><strong className="text-slate-700">⑦ 保存</strong><br/>右上「保存」→ フォルダ「○○病院」を作成 → 名前「2026年5月分_通常品」で保存</div>
                  <div><strong className="text-slate-700">⑧ 印刷／PDF</strong><br/>右上「印刷/PDF」 → A4縦のプレビュー表示 → ブラウザの印刷ダイアログで「PDFに保存」も選択可能</div>
                </div>
              </section>

              <section className="bg-white p-4 rounded border border-slate-200">
                <h4 className="font-bold text-base mb-2 flex items-center gap-2 text-slate-800"><Printer className="w-5 h-5 text-red-500" /> 4. 印刷・PDF出力</h4>
                <ul className="list-disc pl-5 space-y-1 text-[13px]">
                  <li>右上「印刷/PDF」ボタン → 自動でプレビュー画面とブラウザ印刷ダイアログが開きます</li>
                  <li>用紙サイズはA4縦に最適化、余白12mm/10mm、印刷時にヘッダー・操作ボタンは自動で非表示</li>
                  <li><strong>Ctrl+P</strong>（Mac は <strong>Cmd+P</strong>）でも印刷できます</li>
                  <li>PDF保存：印刷ダイアログの「送信先」欄で「<strong>PDFに保存</strong>」を選択</li>
                  <li>ページ跨ぎ時はテーブルヘッダーが各ページに繰り返し表示されます</li>
                </ul>
              </section>

              <section className="bg-white p-4 rounded border border-slate-200">
                <h4 className="font-bold text-base mb-2 flex items-center gap-2 text-slate-800"><Building2 className="w-5 h-5 text-amber-500" /> 5. 営業所・担当者情報の設定</h4>
                <ul className="list-disc pl-5 space-y-1 text-[13px]">
                  <li>初回ログイン時に営業所＋担当者名を選んだ内容が自動セットされます</li>
                  <li>「営業所設定」ボタンで会社名・住所・電話・FAX・所長名・担当者名を後から編集可能</li>
                  <li>「営業所マスタから選択（自動入力）」プルダウンで19拠点いずれかを選ぶと住所等が一括反映</li>
                  <li>設定内容は見積書の右上に印字されます（所長印・担当印の枠も自動配置）</li>
                </ul>
              </section>

              <section className="bg-white p-4 rounded border border-slate-200">
                <h4 className="font-bold text-base mb-2 flex items-center gap-2 text-slate-800"><Settings className="w-5 h-5 text-slate-500" /> 6. その他の便利機能</h4>
                <ul className="list-disc pl-5 space-y-1 text-[13px]">
                  <li><strong>税区分：</strong>税抜／税込／非課税を切替。下部備考と合計金額のサフィックスが連動して切替</li>
                  <li><strong>合計表示：</strong>ON/OFFで合計金額の表示／非表示を切替（一部商品のみの提案時に便利）</li>
                  <li><strong>プレビュー：</strong>入力欄を隠して完成イメージを画面で確認</li>
                  <li><strong>マーカー強調：</strong>各行の🖍ボタンで黄色ハイライト（おすすめ商品の強調表示に）</li>
                  <li><strong>自動下書き保存：</strong>入力中の内容は500ms間隔で自動保存され、ブラウザを閉じても復元されます</li>
                  <li><strong>ログアウト：</strong>右上「ログアウト」で再ログイン可能（保存済データ・下書きは残ります）</li>
                </ul>
              </section>

            </div>
            <div className="p-3 border-t flex justify-end bg-slate-50"><button onClick={() => setShowGuideModal(false)} className="px-6 py-2 bg-blue-600 text-white font-bold rounded text-sm hover:bg-blue-700">確認しました</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

document.getElementById('loading').style.display = 'none';
createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
