  // === 早期エラー検出: 何かが失敗したら見える形で表示 ===
  window.__loadStart = Date.now();
  window.__appErrors = [];
  window.__showLoadError = function(title, detail) {
    var el = document.getElementById('loading-err');
    if (!el) return;
    el.classList.add('show');
    el.innerHTML = '<strong>⚠ ' + title + '</strong><br/><span style="font-size:12px;">' + (detail||'') + '</span>' +

      '<button class="reload-btn" onclick="location.reload(true)">🔄 再読込</button>';
  };
  window.addEventListener('error', function(e) {
    // リソース読込失敗(<script>/<img>等)は e.target にtagがある。e.error はnull
    var isResource = e.target && e.target !== window && (e.target.src || e.target.href);
    var msg;
    if (isResource) {
      msg = 'リソース読込失敗: ' + (e.target.tagName||'') + ' ' + (e.target.src || e.target.href || '');
    } else {
      msg = (e.error && (e.error.stack||e.error.message)) || e.message || ('不明なエラー');
    }
    window.__appErrors.push({type:'error', msg:msg, src:e.filename, line:e.lineno});
    // アプリ起動済みフラグまたはローディング画面が消えてれば、オーバーレイ表示しない
    if (window.__appMounted) return;
    var loadingEl = document.getElementById('loading');
    if (loadingEl && loadingEl.style.display === 'none') return;
    // リソース系の error は一度だけ表示（複数連続を抑制）
    if (isResource && window.__resErrShown) return;
    if (isResource) window.__resErrShown = true;
    window.__showLoadError(isResource ? '外部リソースの読込に失敗しました' : 'スクリプトエラーが発生しました', msg + (e.filename?' ('+e.filename+':'+e.lineno+')':''));
  }, true);
  window.addEventListener('unhandledrejection', function(e) {
    var msg = (e.reason && (e.reason.stack||e.reason.message)) || String(e.reason);
    window.__appErrors.push({type:'promise', msg:msg});
    if (window.__appMounted) return;
    var loadingEl = document.getElementById('loading');
    if (loadingEl && loadingEl.style.display === 'none') return;
    window.__showLoadError('読込中に問題が発生しました', msg);
  });

    var root = document.getElementById('root');

const simpleHash = (str) => {
  const salted = 'taiyo_salt_' + String(str);
  let h = 0x811c9dc5;
  for (let i = 0; i < salted.length; i++) {
    h ^= salted.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(36) + '_' + (salted.length * 31).toString(36);
};

const loadStorage = (key, fallback) => {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    const parsed = JSON.parse(raw);
    // 不正な null / undefined はフォールバック使用
    if (parsed === null || parsed === undefined) return fallback;
    // fallback が Array なのに parsed がオブジェクトの場合もフォールバック
    if (Array.isArray(fallback) && !Array.isArray(parsed)) return fallback;
    return parsed;
  } catch { return fallback; }
};

const saveStorageCache = {};
const saveStorage = (key, data) => {
  try {
    const s = JSON.stringify(data);
    if (saveStorageCache[key] === s) return true;
    saveStorageCache[key] = s;
    localStorage.setItem(key, s);
    return true;
  } catch { return false; }
};

const inferFromProductName = (name) => {
  if (!name) return null;
  const n = name.toLowerCase();
  let volume = null, unit = null, baseScale = null;
  const match = n.match(/(\d+\.?\d*)\s*(ml|l|g|kg|枚|個|本|箱|m|cm|組|台)/i);
  if (match) {
    volume = match[1];
    const foundUnit = match[2].toLowerCase();
    const option = UNIT_OPTIONS.find(o => o.value.toLowerCase() === foundUnit || (foundUnit === 'l' && o.value === 'L'));
    if (option) { unit = option.value; baseScale = option.defaultBase; }
  }
  if (!unit) {
    if (n.includes('トイレット') || n.includes('ロール')) unit = '個';
    else if (n.includes('アルコール') || n.includes('石鹸') || n.includes('液') || n.includes('洗剤')) unit = 'ml';
    else if (n.includes('袋') || n.includes('グローブ') || n.includes('マスク')) unit = '枚';
    else if (n.includes('ラップ')) unit = 'm';
    else if (n.includes('車椅子') || n.includes('車いす') || n.includes('ベッド')) unit = '台';
    if (unit) { const option = UNIT_OPTIONS.find(o => o.value === unit); baseScale = option?.defaultBase || 1; }
  }
  return { volume, unit, baseScale };
};

// 数値表示用フォーマッタ
// バグ修正: 「200.」（末尾ピリオド）や「200.50」（末尾0）が消える問題を解消。
// 入力途中の値を破壊せず、整数部のみカンマ区切り、小数点と小数部はそのまま保持する。
const formatNumber = (v) => {
  if (v === null || v === undefined || v === '') return '';
  const s = String(v).trim();
  if (s === '' || s === '-') return s;
  // 数字＋小数点パターンを抽出（先頭マイナス可、整数部・小数点・小数部を別キャプチャ）
  const m = s.match(/^(-?)(\d*)(\.?)(\d*)$/);
  if (!m) {
    // 想定外フォーマット → Number化を試みる
    const n = Number(s); if (!isFinite(n)) return '';
    return n.toLocaleString('ja-JP');
  }
  const [, sign, intPart, dot, decPart] = m;
  // 整数部が空（".5"のような入力）の場合
  if (intPart === '' && dot === '') return '';
  const intStr = intPart === '' ? '' : Number(intPart).toLocaleString('ja-JP');
  return sign + intStr + dot + decPart;
};
const parseNumberInput = (raw) => {
  if (raw === null || raw === undefined) return '';
  // 全角数字→半角、カンマ・スペース除去（マイナス記号 -, ー, －, ‐ は保持して - に正規化）
  return String(raw)
    .replace(/[０-９]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
    .replace(/[ー−－‐―‒–]/g, '-')  // 全角ハイフン・ダッシュ類を - に
    .replace(/[,，\s]/g, '');
};

  if (v === null || v === undefined || v === '') return '';
  const n = Number(v);
  if (!isFinite(n)) return '';
  return n.toLocaleString('ja-JP', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
};

function LoginScreen({ onLogin }) {
  const [officeCode, setOfficeCode] = useState('');
  const [userName, setUserName] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  // 初回ユーザーには「新規登録」を、既存ユーザーには「ログイン」をデフォルト表示
  const [mode, setMode] = useState(() => loadStorage(STORAGE_KEYS.USERS, []).length === 0 ? 'register' : 'login');
  const [readyOnly, setReadyOnly] = useState(true);
  const users = loadStorage(STORAGE_KEYS.USERS, []);

  // マウント直後にreadOnly解除→ブラウザのオートフィル発火を抑制
  useEffect(() => {
    const t = setTimeout(() => setReadyOnly(false), 250);
    // 念のため入力値を初期化
    setOfficeCode(''); setUserName(''); setPassword('');
    return () => clearTimeout(t);
  }, []);
  // タブ切替時にも空に戻す
  useEffect(() => { setOfficeCode(''); setUserName(''); setPassword(''); }, [mode]);

  const findMatchingOffice = (code) => {
    const c = code.trim();
    if (!c) return null;
    return OFFICE_MASTER.find(o => o.name === c || o.name === c + '営業所' || o.name.startsWith(c));
  };

  const submit = (e) => {
    e?.preventDefault();
    const code = officeCode.trim();
    const n = normalizeName(userName);
    if (!code) { setError('営業所コードを入力してください'); return; }
    if (!n) { setError('名前を入力してください'); return; }
    if (!password || password.length < 6) { setError('パスワードは6文字以上で入力してください'); return; }

    const key = `${code}__${n}`;
    const existing = users.find(u => u.key === key);
    const inputHash = simpleHash(password);

    if (mode === 'login') {
      if (!existing) { setError('登録されていません。「新規登録」タブで登録してください'); return; }
      if (existing.hash !== inputHash) { setError('パスワードが違います'); return; }
    } else {
      if (existing) { setError('このコード+名前は既に登録済みです。「ログイン」タブから入ってください'); return; }
      const newUser = { key, officeCode: code, name: n, hash: inputHash, createdAt: Date.now() };
      saveStorage(STORAGE_KEYS.USERS, [...users, newUser]);
    }

    const master = findMatchingOffice(code);
    const officeName = master ? master.name : code + '営業所';
    // 同期キーをここで埋め込む（USERSへの再ルックアップ不要にする）
    onLogin({ office: officeName, officeCode: code, userName: n, passwordHash: inputHash, masterFound: !!master, loggedInAt: Date.now() });
  };

  const canSubmit = officeCode.trim() && userName.trim() && password.length >= 6;

  return (
    <div className="min-h-screen bg-stone-100 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-lg max-w-sm w-full overflow-hidden border border-stone-200">
        <div className="bg-white border-b border-stone-200 px-6 pt-6 pb-4 text-center">
          <FileText className="w-10 h-10 mx-auto mb-2 text-amber-500" />
          <h1 className="text-base font-bold text-stone-800">太陽シルバーサービス㈱</h1>
          <p className="text-xs text-stone-500 mt-0.5">見積書・提案書作成システム</p>
        </div>
        <div className="flex border-b border-stone-200 bg-stone-50">
          <button type="button" onClick={() => { setMode('login'); setError(''); }} className={`flex-1 py-2.5 text-sm font-bold transition ${mode === 'login' ? 'bg-white text-stone-800 border-b-2 border-amber-500' : 'text-stone-500 hover:text-stone-700'}`}>ログイン</button>
          <button type="button" onClick={() => { setMode('register'); setError(''); }} className={`flex-1 py-2.5 text-sm font-bold transition ${mode === 'register' ? 'bg-white text-stone-800 border-b-2 border-amber-500' : 'text-stone-500 hover:text-stone-700'}`}>新規登録</button>
        </div>
        <form onSubmit={submit} className="p-5 space-y-3 bg-white" autoComplete="off">
          {/* ダミーフィールド(Chromeのオートフィルを吸収させる) */}
          <input type="text" name="fakeusernameremembered" style={{display:'none'}} autoComplete="username" tabIndex={-1} aria-hidden />
          <input type="password" name="fakepasswordremembered" style={{display:'none'}} autoComplete="new-password" tabIndex={-1} aria-hidden />
          <div>
            <label className="block text-xs font-bold text-stone-600 mb-1">コード(営業所名)</label>
            <input type="text" value={officeCode} onChange={e => { setOfficeCode(e.target.value); setError(''); }} placeholder="行橋" autoComplete="off" readOnly={readyOnly} onFocus={() => setReadyOnly(false)} name={`oc_${Math.random().toString(36).slice(2,8)}`} className="w-full px-3 py-2 border border-stone-300 rounded-md outline-none focus:border-amber-500 text-sm bg-stone-50 focus:bg-white placeholder:text-stone-300 placeholder:font-normal" autoFocus />
          </div>
          <div>
            <label className="block text-xs font-bold text-stone-600 mb-1">名前</label>
            <input type="text" value={userName} onChange={e => { setUserName(e.target.value); setError(''); }} placeholder="山田 太郎" autoComplete="off" readOnly={readyOnly} onFocus={() => setReadyOnly(false)} name={`un_${Math.random().toString(36).slice(2,8)}`} className="w-full px-3 py-2 border border-stone-300 rounded-md outline-none focus:border-amber-500 text-sm bg-stone-50 focus:bg-white placeholder:text-stone-300 placeholder:font-normal" />
          </div>
          <div>
            <label className="block text-xs font-bold text-stone-600 mb-1">パスワード <span className="text-stone-400 font-normal">(6文字以上)</span></label>
            <input type="password" value={password} onChange={e => { setPassword(e.target.value); setError(''); }} placeholder="6文字以上" autoComplete="new-password" readOnly={readyOnly} onFocus={() => setReadyOnly(false)} name={`pw_${Math.random().toString(36).slice(2,8)}`} className="w-full px-3 py-2 border border-stone-300 rounded-md outline-none focus:border-amber-500 text-sm bg-stone-50 focus:bg-white placeholder:text-stone-300 placeholder:font-normal" />
          </div>
          {error && <div className="bg-rose-50 border border-rose-200 text-rose-700 text-xs font-bold p-2 rounded">{error}</div>}
          <button type="submit" disabled={!canSubmit} className={`w-full font-bold py-2.5 rounded-md transition text-sm ${canSubmit ? 'bg-amber-500 hover:bg-amber-600 text-white shadow' : 'bg-stone-200 text-stone-400 cursor-not-allowed'}`}>{mode === 'register' ? '登録してはじめる' : 'ログイン'}</button>
        </form>
        <div className="bg-stone-50 border-t border-stone-200 px-5 py-2.5 text-center text-[10px] text-stone-500">
          {mode === 'login' ? <><strong className="text-amber-700">はじめての方は「新規登録」タブから</strong>。どのPCでもログイン可能です。</> : '※ パスワードは暗号化してこの端末に保存されます'}
        </div>
      </div>
    </div>
  );
}

      _type: 'taiyo-share',
      version: 1,
      from: { officeCode: loginInfo?.officeCode || '', name: loginInfo?.userName || '', hash: (loadStorage(STORAGE_KEYS.USERS, []).find(u => u.key === `${loginInfo?.officeCode}__${loginInfo?.userName}`)?.hash) || '' },
      exportedAt: Date.now(),
      folders, savedProposals,
    };

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `共有見積_${loginInfo?.officeCode||''}_${loginInfo?.userName||''}_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    notify(`共有用ファイルを保存しました（${savedProposals.length}件）`);

  const processImportShare = (data) => {
    if (!data || typeof data !== 'object') { setImportError('共有データを読み込めません（ファイル形式が不正）'); return; }
    if (data._type !== 'taiyo-share') { setImportError('共有データの形式が違います（_typeが taiyo-share ではありません）'); return; }
    const from = data.from || {};
    if (importCode.trim() && from.officeCode !== importCode.trim()) { setImportError(`共有元の営業所コード「${from.officeCode||'(不明)'}」と一致しません`); return; }
    if (importName.trim() && from.name !== normalizeName(importName)) { setImportError(`共有元の名前「${from.name||'(不明)'}」と一致しません`); return; }
    if (importPassword && simpleHash(importPassword) !== from.hash) { setImportError('共有元のパスワードが違います'); return; }
    const importedFolders = Array.isArray(data.folders) ? data.folders : [];
    const importedProposals = Array.isArray(data.savedProposals) ? data.savedProposals : [];
    if (importedFolders.length === 0 && importedProposals.length === 0) { setImportError('共有データに見積もフォルダも含まれていません'); return; }
    const existingFolderNames = new Set(folders.map(f => f.name));
    const newFolders = importedFolders.filter(f => !existingFolderNames.has(f.name)).map(f => ({ ...f, id: genId('fld') }));
    const nameToNewId = {};
    importedFolders.forEach(f => {
      const ex = folders.find(x => x.name === f.name);
      if (ex) nameToNewId[f.id] = ex.id;
      else { const nf = newFolders.find(x => x.name === f.name); if (nf) nameToNewId[f.id] = nf.id; }

      // Cache API クリア

  const [firebaseReadyTick, setFirebaseReadyTick] = useState(0);

    const ok = tryInitFirebase();

  });
  useEffect(() => { try { localStorage.setItem('taiyo_cloudSync', cloudSyncEnabled ? '1' : '0'); } catch {} }, [cloudSyncEnabled]);
  // ネットワーク診断
  const [diagReport, setDiagReport] = useState(null);
  const [diagRunning, setDiagRunning] = useState(false);
  const runDiagnostic = async () => {
    setDiagRunning(true); setDiagReport(null);
    const checks = [];

    // 1. オンライン状態

    // 3. CDN到達
    try { await withTimeout(fetch('https://esm.sh/firebase@10.14.0/app', { method:'HEAD', mode:'no-cors', cache:'no-store' }), 6000); checks.push({ id:'cdn', label:'Firebase CDN（esm.sh）', pass:true }); }
    catch (e) { checks.push({ id:'cdn', label:'Firebase CDN（esm.sh）', pass:false, error:e.message, suggestion:'社内ネットワークから esm.sh への通信が遮断されている可能性' }); }
    // 4. Firebase RTDB endpoint

    catch (e) { checks.push({ id:'rtdb', label:'Firebase Realtime DB エンドポイント', pass:false, error:e.message, suggestion:'firebaseio.com / firebasedatabase.app ドメインがブロックされている可能性' }); }
    // 5. Firebase SDK 初期化
    checks.push({ id:'sdkInit', label:'Firebase SDK 初期化', pass: !!firebaseDB, error: firebaseInitError||null, suggestion: firebaseDB ? null : 'SDKのロードに失敗。Ctrl+F5 でページ再読込してください' });
    setDiagReport({ ts: Date.now(), checks, summary: { total: checks.length, passed: checks.filter(c => c.pass).length } });

  };
  const remoteLoadedRef = useRef(false); // 初回remote取得が完了するまで write を抑制（レース回避）

  const getSyncKey = () => {

    try {

      if (!users.find(x => x.key === key)) {

  useEffect(() => {

  // 接続：ログイン後 or ログアウト時 or 再接続要求で同期接続を貼り直す
  useEffect(() => {
    remoteLoadedRef.current = false; // 接続のたびにリセット

    }
    // クラウド同期がOFFの場合は接続しない（ローカルのみで動作）

    if (!firebaseDB) {
      setSyncStatus('error');
      setSyncError(firebaseInitError ? `Firebase初期化エラー: ${firebaseInitError}` : 'Firebase 初期化に失敗（CDN・ネットワーク要確認）');

    setSyncStatus('connecting'); setSyncError(null);
    // 初回読込が完了するまでローカル書込を抑制（リモート上書きレースを防止）
    suppressNextWriteRef.current = true;
    const r = dbRef(firebaseDB, `users/${syncKey}/data`);
    syncRefHandle.current = r;
    let unsubVal = null;
    // 初回読込：リモート側にデータがあれば取り込む（既存データ削除を絶対防止）
    dbGet(r).then(snap => {
      const remote = snap.val();
      // === データ保護ロジック ===
      // ①リモートが完全に空 → ローカル維持（リモート初期化／別端末未保存ケース）
      // ②リモートのフォルダ・見積件数がローカルより少なすぎる → 確認ダイアログを出して保護
      // ③その他 → リモートを取り込む
      if (remote && (Array.isArray(remote.folders) || Array.isArray(remote.savedProposals))) {
        const rF = Array.isArray(remote.folders) ? remote.folders : [];
        const rP = Array.isArray(remote.savedProposals) ? remote.savedProposals : [];
        const lF = folders || [];
        const lP = savedProposals || [];
        // リモートが極端に少ない（ローカルの方が3件以上多い）場合は確認
        const looksLikeDataLoss = (lP.length > rP.length + 2 && lP.length > 0) || (lF.length > rF.length + 2 && lF.length > 0);
        if (looksLikeDataLoss) {
          const ok = confirm(`⚠ データ保護警告\n\nリモート（クラウド）の方がデータが大幅に少なくなっています。\n・ローカル: フォルダ${lF.length}件 / 見積${lP.length}件\n・リモート: フォルダ${rF.length}件 / 見積${rP.length}件\n\n「OK」= リモート(少ない方)で上書き／「キャンセル」= ローカル(多い方)を保持して、次の保存でリモートに反映`);
          if (!ok) {
            // ローカル保持 → 書込時にローカルがリモートに反映される
            console.log('[DataProtect] ローカルデータを保持しました');
            remoteLoadedRef.current = true;
            setSyncStatus('synced'); setLastSyncedAt(Date.now()); setSyncError(null);
            return;
          }
        }
        suppressNextWriteRef.current = true;
        if (Array.isArray(remote.folders)) setFolders(remote.folders);
        if (Array.isArray(remote.savedProposals)) setSavedProposals(remote.savedProposals);
        lastSyncedJsonRef.current = JSON.stringify({ folders: rF, savedProposals: rP });
      } else {
        // リモートが完全に空 → ローカルデータをそのまま保持（次の書込で同期される）
        console.log('[Firebase] リモートに既存データなし。ローカルを保持して同期へ。');
      }
      remoteLoadedRef.current = true;
      setSyncStatus('synced'); setLastSyncedAt(Date.now()); setSyncError(null);
    }).catch(err => {
      console.warn('sync get error', err);
      const m = err?.code || err?.message || String(err);
      setSyncStatus('error'); setSyncError('初回読込エラー: ' + m);
      remoteLoadedRef.current = true; // エラー時もwriteは解放（ローカル保存だけは続ける）
    });

    unsubVal = onValue(r, (snap) => {
      const remote = snap.val(); if (!remote) return;
      const remoteJson = JSON.stringify({ folders: remote.folders||[], savedProposals: remote.savedProposals||[] });

      try {

          const lUp = localCur && localCur.updatedAt ? localCur.updatedAt : 0;

            if (!ok) {
              // ローカル保持：foldersのみ取り込み、savedProposalsは現状維持
              suppressNextWriteRef.current = true;
              if (Array.isArray(remote.folders)) setFolders(remote.folders);

  // === 受信トレイ（インボックス）購読：相手から直接共有されたデータを受信 ===
  // インボックスキーは officeCode + name のみから導出（パスワード不要）→ 送信者が知れる
  const getMyInboxKey = () => loginInfo ? simpleHash(`${loginInfo.officeCode}__${loginInfo.userName}`) : null;
  useEffect(() => {
    if (!loginInfo || !firebaseDB || !cloudSyncEnabled) return;

    const unsub = onValue(r, (snap) => {
      const v = snap.val() || {};
      const items = Object.entries(v).map(([id, d]) => ({ shareId: id, ...d }));
      const now = Date.now(), TTL = 30*24*3600*1000;
      items.forEach(it => { if (it.sentAt && now - it.sentAt > TTL) { try { dbSet(dbRef(firebaseDB, `inbox/${inboxKey}/${it.shareId}`), null); } catch {} } });
      const fresh = items.filter(it => !it.sentAt || now - it.sentAt <= TTL).sort((a,b) => (b.sentAt||0)-(a.sentAt||0));
      // 新着検出：seenIdsRef に未登録のアイテムをポップアップ通知
      if (seenIdsRef.current === null) {
        // 初回ロード時は既存を「既読」扱い（古い通知のスパム防止）
        seenIdsRef.current = new Set(fresh.map(f => f.shareId));

        if (newItems.length > 0) {
          newItems.forEach(it => seenIdsRef.current.add(it.shareId));

  // === Presence: 自分のオンライン状態を公開 ===
  useEffect(() => {

    const userKey = simpleHash(`${officeCode}__${userName}`);
    const pRef = dbRef(firebaseDB, `presence/${officeCode}/${userKey}`);
    const writeOnline = () => dbUpdate(pRef, { name: userName, officeCode, online: true, lastSeen: Date.now() }).catch(e => console.warn('presence write', e));
    writeOnline();
    try { onDisconnect(pRef).set({ name: userName, officeCode, online: false, lastSeen: Date.now() }); } catch {}
    const hb = setInterval(writeOnline, 30000);
    const onVis = () => { if (document.visibilityState === 'visible') writeOnline(); };
    document.addEventListener('visibilitychange', onVis);
    const onUnload = () => { try { dbSet(pRef, { name: userName, officeCode, online: false, lastSeen: Date.now() }); } catch {} };
    window.addEventListener('beforeunload', onUnload);
    return () => {
      clearInterval(hb);
      document.removeEventListener('visibilitychange', onVis);

  // 営業所共有データの書込：マージ方式（既存上書き禁止、新規追加のみ）
  const saveToOfficeShared = async (folder, proposal) => {
    if (!firebaseDB || !loginInfo || !cloudSyncEnabled) { notify('Firebase未接続のため営業所共有はできません', 'error'); return false; }
    try {
      const r = dbRef(firebaseDB, `office-shared/${loginInfo.officeCode}`);

      const curFolders = Array.isArray(cur.folders) ? cur.folders : [];
      const curProposals = Array.isArray(cur.savedProposals) ? cur.savedProposals : [];
      // フォルダはID/名前で重複チェックして追加
      let mergedFolders = curFolders;
      if (folder && !curFolders.find(f => f.id === folder.id || f.name === folder.name)) {
        mergedFolders = [...curFolders, { ...folder, _sharedBy: loginInfo.userName, _sharedAt: Date.now() }];

      // 見積はID重複チェックして追加（既存IDは上書きせず別IDで追加=保護）

  // === 直接送信：相手の営業所コード＋名前を指定して見積を送信 ===
  // === QR共有：短期トークンをFirebase /qrshare/{token} に保存し、QRコードでURL共有 ===
  // 受信者はQRをスマホで読み取り → ?qr=token でアプリを開く → 自動取込
  const handleQRShare = async () => {
    if (!firebaseDB) { notify('Firebase未接続のためQR共有はできません'); return; }
    if (savedProposals.length === 0 && folders.length === 0) { notify('共有できるデータがありません'); return; }
    const token = Math.random().toString(36).slice(2,10) + Date.now().toString(36);
    const expires = Date.now() + 10 * 60 * 1000; // 10分有効
    try {
      await dbSet(dbRef(firebaseDB, `qrshare/${token}`), {
        from: { officeCode: loginInfo?.officeCode || '', name: loginInfo?.userName || '' },
        sentAt: Date.now(),
        ttl: expires,
        data: JSON.stringify({ folders, savedProposals }),
      });
      const base = window.location.origin + window.location.pathname;
      const url = `${base}?qr=${token}`;
      setQRShareUrl(url);
      setQRShareExpiresAt(expires);
      setShowQRShareModal(true);
    } catch (err) {
      notify('QR共有の準備に失敗: ' + (err?.message||String(err)));
    }
  };

  // === ?qr=xxx を検知して自動取込 ===
  useEffect(() => {
    if (!loginInfo || !firebaseDB) return;
    const params = new URLSearchParams(window.location.search);
    const token = params.get('qr');
    if (!token) return;
    // 取得・取込・トークン削除
    (async () => {
      try {
        const snap = await dbGet(dbRef(firebaseDB, `qrshare/${token}`));
        const v = snap.val();
        if (!v) { notify('QRコードが見つかりません（既に使用済みか期限切れ）'); return; }
        if (v.ttl && Date.now() > v.ttl) { notify('QRコードの有効期限切れです'); return; }
        const parsed = JSON.parse(v.data || '{}');

  const handleDirectSend = async () => {

  const calculatePrices = (item, changedField) => {
    let { packSize, price, casePrice, cost, caseCost, targetMargin } = item;
    const ps = Math.max(Number(packSize) || 1, 1);
    const recalcMargin = () => {
      const p = Number(price) || 0; const c = Number(cost) || 0;
      if (p > 0 && c > 0 && c < p) targetMargin = Math.round(((p - c) / p) * 1000) / 10;
      else if (p > 0 && c === 0) targetMargin = '';
    };
    if (changedField === 'packSize') { casePrice = (Number(price)||0)*ps; caseCost = (Number(cost)||0)*ps; }
    else if (changedField === 'casePrice') { price = Math.round((Number(casePrice)||0)/ps); recalcMargin(); }
    else if (changedField === 'caseCost') {
      cost = Math.round((Number(caseCost)||0)/ps);
      if (targetMargin !== '' && Number(targetMargin) < 100 && Number(targetMargin) > 0 && (Number(price)||0) === 0) {
        price = Math.round(cost/(1 - Number(targetMargin)/100)); casePrice = price*ps;
      } else recalcMargin();
    }
    else if (changedField === 'price') { casePrice = (Number(price)||0)*ps; recalcMargin(); }
    else if (changedField === 'cost') {
      caseCost = (Number(cost)||0)*ps;
      if (targetMargin !== '' && Number(targetMargin) < 100 && Number(targetMargin) > 0 && (Number(price)||0) === 0) {
        price = Math.round(cost/(1 - Number(targetMargin)/100)); casePrice = price*ps;
      } else recalcMargin();
    }
    else if (changedField === 'targetMargin') {
      if (targetMargin !== '' && Number(targetMargin) < 100 && Number(targetMargin) > 0) {
        const c = Number(cost)||0;
        if (c > 0) { price = Math.round(c/(1 - Number(targetMargin)/100)); casePrice = price*ps; }
      }

    return { ...item, packSize, price, casePrice, cost, caseCost, targetMargin };
  };

  const computedGroups = useMemo(() => {
    return groups.map((group) => {
      const monthlyUsage = (group.baseVolume||0) * (group.baseQuantity||0);
      const cleanTitle = group.title ? group.title.replace(CLEAN_TITLE_REGEX, '').trim() : '';
      const calculatedItems = group.items.map((item) => {
        const vol = Number(item.volume); const pri = Number(item.price); const cost = Number(item.cost)||0;
        const profit = pri - cost; const margin = pri > 0 ? (profit/pri)*100 : 0;
        const unitPrice = vol > 0 ? (pri/vol)*group.baseScale : 0;
        const monthlyCost = vol > 0 ? (monthlyUsage/vol)*pri : 0;

      });
      // カテゴリ別小計（モード別の金額算出ロジックと一致させる）
      const groupSubtotal = calculatedItems.reduce((s, i) => {
        const pri = Number(i.price) || 0;
        const factor = appMode === 'proposal' ? (Number(i.packSize)||0) : (Number(i.volume)||0);
        return s + factor * pri;
      }, 0);
      if (calculatedItems.length === 0) return { ...group, cleanTitle, items: [], stats: null, subtotal: 0 };
      const sortedForStats = [...calculatedItems].sort((a,b) => b.unitPriceRaw - a.unitPriceRaw);
      const best = sortedForStats[sortedForStats.length-1]; const worst = sortedForStats[0];

      const yearlyReduction = worst.yearlyCost - best.yearlyCost;

  const addGroup = () => {

  const sortGroupItems = (gid) => {
    setGroups(prev => prev.map(g => {
      if (g.id !== gid || g.items.length <= 1) return g;
      const baseline = g.items[0];
      const proposals = g.items.slice(1).sort((a,b) => {

        const ub = Number(b.volume)>0 ? Number(b.price)/Number(b.volume) : 0;

      });
      return { ...g, items: [baseline, ...proposals] };
    }));
  };

  const handleInputChange = (gid, field, value) => {
    setNewItems(prev => {
      const cur = prev[gid] || getEmptyItem();
      let u = { ...cur, [field]: value };
      if (field === 'name') {

          if (inf.unit) { updateGroupField(gid, 'unit', inf.unit); updateGroupField(gid, 'baseScale', inf.baseScale); }
        }
      }
      return { ...prev, [gid]: calculatePrices(u, field) };
    });
  };
  // 指定位置に空行を挿入（atIndex=0なら先頭、items.lengthなら末尾）
  const insertItemAt = (gid, atIndex) => {
    setGroups(prev => prev.map(g => {

      items.splice(Math.max(0, Math.min(atIndex, items.length)), 0, blank);

    }));
  };
  const handleAddItem = (gid) => {
    const inp = newItems[gid]; if (!inp) return;
    setGroups(prev => prev.map(g => {
      if (g.id !== gid) return g;

            updateGroupField(g.id, 'baseScale', inf.baseScale);
          }
        }

      }) };
    }));
  };
  // 削除した行を記録（Undo用）— 最大10件保持
  const undoStackRef = useRef([]);
  const pushUndo = (entry) => {
    undoStackRef.current = [entry, ...undoStackRef.current].slice(0, 10);
    setUndoAvailable(true);

  };
  const [undoAvailable, setUndoAvailable] = useState(false);
  const handleUndo = () => {
    const entry = undoStackRef.current[0];

    undoStackRef.current = undoStackRef.current.slice(1);
    if (entry.type === 'deleteItem') {
      setGroups(prev => prev.map(g => g.id === entry.gid ? { ...g, items: [...g.items.slice(0, entry.idx), entry.item, ...g.items.slice(entry.idx)] } : g));

    } else if (entry.type === 'deleteGroup') {

    }

  };
  const deleteItem = (gid, iid) => setGroups(prev => prev.map(g => {

// === ErrorBoundary：React描画中の例外をキャッチして白画面を回避 ===
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info); }
  render() {
    if (this.state.error) {
      const err = this.state.error;
      return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'#f1f5f9'}}>
          <div style={{maxWidth:640,background:'#fff',border:'2px solid #ef4444',borderRadius:12,padding:24}}>
            <div style={{fontSize:'18px',fontWeight:'bold',color:'#b91c1c',marginBottom:12}}>⚠ アプリの描画でエラーが発生しました</div>
            <div style={{fontSize:'13px',color:'#475569',background:'#fef2f2',padding:12,borderRadius:6,fontFamily:'monospace',whiteSpace:'pre-wrap',marginBottom:16}}>{err.message||String(err)}{err.stack?'\n\n'+err.stack.split('\n').slice(0,5).join('\n'):''}</div>
            <div style={{fontSize:'13px',color:'#334155',marginBottom:16}}>
              <strong>対処方法：</strong><br/>
              1. <button onClick={() => location.reload(true)} style={{padding:'6px 12px',background:'#1e40af',color:'#fff',border:0,borderRadius:4,cursor:'pointer'}}>ページ再読込</button> を試す<br/>
              2. それでもダメな場合は下記ボタンで下書きをリセット（保存済みデータは残ります）<br/>
              3. 「クラウド同期」を OFF にして再ログインしてみる
            </div>
            <button onClick={() => { if(confirm('編集中の下書きを破棄します。保存済みデータは残ります。よろしいですか？')){ try{localStorage.removeItem('taiyo_draft_v1');}catch{} location.reload(true); } }} style={{padding:'8px 16px',background:'#dc2626',color:'#fff',border:0,borderRadius:4,cursor:'pointer',fontWeight:'bold',marginRight:8}}>下書きを破棄して再起動</button>
            <button onClick={() => this.setState({error:null})} style={{padding:'8px 16px',background:'#64748b',color:'#fff',border:0,borderRadius:4,cursor:'pointer'}}>リトライ</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// === 起動：失敗してもユーザーにエラーが見える形で表示 ===
try {
  const __loadingEl = document.getElementById('loading');
  const __rootEl = document.getElementById('root');
  if (!__rootEl) throw new Error('#root が見つかりません');
  const __r = createRoot(__rootEl);
  __r.render(<ErrorBoundary><App /></ErrorBoundary>);
  // 描画が始まったら少しだけ待ってからローディングを消す（早すぎる消去でちらつき回避）
  requestAnimationFrame(() => requestAnimationFrame(() => {
    if (__loadingEl) __loadingEl.style.display = 'none';
    window.__appMounted = true;
    // CSSレベルで強制非表示：印刷ホルダーが存在しない時は ツールバーを必ず display:none
    const enforceStyle = document.createElement('style');
    enforceStyle.id = 'print-toolbar-enforcement';
    enforceStyle.textContent = `body:not(.has-print-preview) #print-toolbar { display: none !important; visibility: hidden !important; pointer-events: none !important; }`;
    document.head.appendChild(enforceStyle);
    // 起動時 + 継続的監視で印刷プレビューの孤児DOM要素を完全除去
    const scrubOrphans = () => {
      const holder = document.getElementById('print-content-holder');
      const toolbar = document.getElementById('print-toolbar');
      const style = document.getElementById('print-injected-style');
      if (holder) {
        document.body.classList.add('has-print-preview');
      } else {
        document.body.classList.remove('has-print-preview');
        if (toolbar) { try { toolbar.remove(); } catch {} }
        if (style) { try { style.remove(); } catch {} }
      }
    };
    scrubOrphans();
    // MutationObserver + setInterval の二重防御
    try { new MutationObserver(scrubOrphans).observe(document.body, { childList: true, subtree: false }); } catch {}
    setInterval(scrubOrphans, 2000); // 2秒ごとにスキャン（保険）
    console.log('[App] mounted in', Date.now()-window.__loadStart, 'ms');
  }));
} catch (err) {
  console.error('[App] 起動エラー:', err);
  if (typeof window.__showLoadError === 'function') {
    window.__showLoadError('アプリの起動に失敗しました', (err && err.message || String(err)) + (err && err.stack ? '\n\n' + err.stack.split('\n').slice(0,5).join('\n') : ''));
  } else {
    const el = document.getElementById('loading');
    if (el) el.innerHTML = '<div style="max-width:600px;color:#b91c1c;background:white;padding:20px;border-radius:8px;font-size:13px;white-space:pre-wrap;"><b>起動エラー</b><br/>' + (err && err.message || err) + '<br/><br/><button onclick="location.reload(true)" style="padding:8px 16px;background:#1e40af;color:#fff;border:0;border-radius:4px;cursor:pointer;">再読込</button></div>';
  }
}
</script>
